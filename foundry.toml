[profile.default]
src = "src"
test = "test"
out = "out"
cache_path = "cache"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
skip = ["LaunchLocker.sol"]
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[profile.ci]
fuzz = { runs = 1_000 }
invariant = { runs = 256, depth = 64 }
